<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/style.css">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <header>
        <nav>

        </nav>
    </header>

    <main>
        <div class="container">

            <h2 id="title">Entrar</h2>

            <form id="form-login">

                <div class="input-group mb-3" id="c-email">
                <input id="email" type="email" class="form-control" placeholder="Email" aria-label="Email" aria-describedby="basic-addon2">
                <span class="input-group-text" id="basic-addon2">@exemplo.com</span>
                </div>

                <div id="c-senha" class="input-group mb-3">
                <input id="senha" type="password" class="form-control" placeholder="Senha" aria-label="Username" aria-describedby="basic-addon1">
                </div>

                <div class="d-grid gap-2">
                <button id="botão-envio" class="btn btn-primary" type="submit">Entrar</button>
                </div>

            </form>

            <div id="mensagem"></div>

            <div class="toggle" id="toggle">
                <p>Não tem conta? cadastre-se!</p>
            </div>

        </div>
    </main>

    <footer>
        <div>

        </div>
    </footer>

    <script src="scripts/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
